# Managed Manifest
# File: platform/gitops/apps/three-scale.yaml
# Purpose: Argo CD child application defining sync source and destination for a platform component.
# Owner: integration-hub platform team

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-scale-onboarding
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/wrenkredhat2/integration-hub-service-gitops.git
    targetRevision: main
    path: platform/3scale/base
  destination:
    server: https://kubernetes.default.svc
    namespace: integration-hub-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
