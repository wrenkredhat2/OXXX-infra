apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-infra
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://git.svc.arencloud.com/egevorky/rhdemo.git
    targetRevision: HEAD
    path: components/overlays/dev
  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false