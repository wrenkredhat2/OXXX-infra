# Managed Manifest
# File: platform/apps/kafka-nbp/base/deployment.yaml
# Purpose: Base application manifest defining deployable workload resources.
# Owner: kafka-nbp platform team

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-nbp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-nbp
  template:
    metadata:
      labels:
        app: kafka-nbp
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets: 
        - name: dpro-int-int-pull-secret
      containers:
        - name: kafka-nbp
          image: image-registry.openshift-image-registry.svc:5000/orl-dpro-int-flows/integration-hub-service@sha256:35bc9bbbe7091be83338e3546d625d4ab55c0f2996aa6a9ac7b0cde49f270e08

          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: KEYCLOAK_CLIENT_SECRET
            - name: OCIPI_DB_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: OCIPI_DB_URL
            - name: OCIPI_DB_USER
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: OCIPI_DB_USER
            - name: OCIPI_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: OCIPI_DB_PASS
            - name: STATUS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: STATUS_DB_URL
            - name: STATUS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: STATUS_DB_USER
            - name: STATUS_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: STATUS_DB_PASS
            - name: EHURT_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: EHURT_TOKEN_URL
            - name: EHURT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: EHURT_CLIENT_ID
            - name: EHURT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: EHURT_CLIENT_SECRET
            - name: EHURT_REST_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-nbp-runtime
                  key: EHURT_REST_URL
