apiVersion: v1
kind: ServiceAccount
metadata:
  name: ca-injector
  annotations:
    argocd.argoproj.io/sync-wave: "12"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ca-injector
  annotations:
    argocd.argoproj.io/sync-wave: "12"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ca-injector
  annotations:
    argocd.argoproj.io/sync-wave: "12"
subjects:
  - kind: ServiceAccount
    name: ca-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ca-injector
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-3scale-ca-injection
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "15"
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: ca-injector
      restartPolicy: Never
      containers:
        - name: ca-injector
          image: quay.io/openshift/origin-cli:4.15
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              wait_for_trusted_ca_bundle() {
                local attempts=60
                local sleep_seconds=5
                local i
                local bundle

                for i in $(seq 1 "${attempts}"); do
                  bundle="$(oc get configmap/trusted-ca -o jsonpath='{.data.ca-bundle\.crt}' 2>/dev/null || true)"
                  if [ -n "${bundle}" ]; then
                    echo "trusted-ca contains ca-bundle.crt"
                    return 0
                  fi
                  echo "Waiting for trusted-ca bundle (${i}/${attempts})..."
                  sleep "${sleep_seconds}"
                done

                echo "ERROR: trusted-ca ConfigMap does not contain ca-bundle.crt after waiting."
                exit 1
              }

              mount_ca() {
                local deploy="$1"
                oc set volume "deployment/${deploy}" \
                  --add \
                  --overwrite \
                  --name=trusted-ca-bundle \
                  --mount-path=/etc/pki/tls/custom/ca-bundle.crt \
                  --sub-path=ca-bundle.crt \
                  --configmap-name=trusted-ca
              }

              set_ca_env() {
                local deploy="$1"
                oc set env "deployment/${deploy}" SSL_CERT_FILE=/etc/pki/tls/custom/ca-bundle.crt
              }

              inject_deployment() {
                local deploy="$1"
                echo "Injecting trusted CA into ${deploy}"
                mount_ca "${deploy}"
                set_ca_env "${deploy}"
              }

              known_deployments=(
                apicast-production
                apicast-staging
                backend-cron
                backend-listener
                backend-worker
                system-app
                system-sidekiq
                system-searchd
                system-sphinx
                zync
                zync-que
              )

              discovered_with_label() {
                oc get deployments -l app=3scale-api-management \
                  -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true
              }

              discovered_from_known() {
                local d
                for d in "${known_deployments[@]}"; do
                  if oc get "deployment/${d}" >/dev/null 2>&1; then
                    echo "${d}"
                  fi
                done
              }

              wait_for_trusted_ca_bundle

              injected=""
              max_attempts=30
              sleep_seconds=10
              attempt=1
              while [ "${attempt}" -le "${max_attempts}" ]; do
                targets="$(
                  {
                    discovered_with_label
                    discovered_from_known
                  } | sed '/^$/d' | sort -u
                )"

                if [ -z "${targets}" ]; then
                  echo "No 3scale deployments found yet (${attempt}/${max_attempts}); retrying..."
                  sleep "${sleep_seconds}"
                  attempt=$((attempt + 1))
                  continue
                fi

                while IFS= read -r deploy; do
                  [ -z "${deploy}" ] && continue
                  if ! grep -qxF "${deploy}" <<< "${injected}"; then
                    inject_deployment "${deploy}"
                    injected="${injected}"$'\n'"${deploy}"
                  fi
                done <<< "${targets}"

                sleep "${sleep_seconds}"
                attempt=$((attempt + 1))
              done

              if [ -z "${injected}" ]; then
                echo "ERROR: no 3scale deployments were found for CA injection."
                exit 1
              fi

              echo "3scale CA injection configured for deployments:"
              echo "${injected}" | sed '/^$/d' | sed 's/^/- /'
