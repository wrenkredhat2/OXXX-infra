apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  annotations:
    argocd.argoproj.io/sync-wave: "00"
type: Opaque
stringData:
  POSTGRESQL_DATABASE: 3scale-db
  POSTGRESQL_USER: 3scale
  POSTGRESQL_PASSWORD: supersecret
  POSTGRESQL_ADMIN_PASSWORD: adminpass
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "00"
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: postgres-port
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  annotations:
    argocd.argoproj.io/sync-wave: "00"
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: postgres-port
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "00"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "00"
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: postgres
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: postgres
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: postgres
      containers:
        - name: postgres
          image: registry.redhat.io/rhel8/postgresql-15@sha256:94182920a14a5175523d40c1bdf1168eaabbb6b494eda0519d3a87916ba937d6
          ports:
            - containerPort: 5432
              name: postgres-port
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
        annotations:
          argocd.argoproj.io/sync-wave: "00"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
