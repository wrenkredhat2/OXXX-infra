apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orl-dpro-int-observe


resources:
  - rolebinding.yaml
  - ../../../base/hawtio

patches:
  - target:
      kind: Hawtio
      name: hawtio
    patch: |-
      - op: replace
        path: /spec/routeHostName
        value: hawtio-dev.apps.orlen.pl
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - op: replace
        path: /spec/config/online/projectSelector
        value: "dev-dpro-int"
    #value: "kubernetes.io/metadata.name in (hawtio,3scale,keycloak,kafka-streams,team-a-dev)"
