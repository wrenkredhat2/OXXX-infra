# Managed Manifest
# File: platform/tekton/base/tasks/task-3scale-onboard.yaml
# Purpose: Reusable Tekton Task implementing a CI/CD step for build, test, scan, or GitOps operations.
# Owner: integration-hub platform team

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: task-3scale-onboard
spec:
  params:
    - name: manifests-path
      default: platform/3scale/base
  workspaces:
    - name: source
  steps:
    - name: info
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        set -eux
        echo "3scale onboarding manifests are stored in $(workspaces.source.path)/repo/$(params.manifests-path)"
        echo "Apply them with GitOps (recommended) or manually with oc apply -k"
