# Managed Manifest
# File: platform/tekton/base/tasks/task-maven-test.yaml
# Purpose: Reusable Tekton Task implementing a CI/CD step for build, test, scan, or GitOps operations.
# Owner: integration-hub platform team

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: task-maven-test
spec:
  params:
    - name: context-dir
  workspaces:
    - name: source
  steps:
    - name: maven-test
      image: registry.redhat.io/ubi9/openjdk-17:latest
      script: |
        set -eu
        if ! command -v mvn >/dev/null 2>&1; then
          microdnf install -y maven
          microdnf clean all
        fi
        SETTINGS_FILE="$(workspaces.source.path)/repo/$(params.context-dir)/.mvn/settings.generated.xml"
        test -f "${SETTINGS_FILE}"
        mvn -q -s "${SETTINGS_FILE}" \
          -f "$(workspaces.source.path)/repo/$(params.context-dir)/pom.xml" test
