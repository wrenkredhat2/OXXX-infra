# Managed Manifest
# File: platform/tekton/base/rbac/clusterrolebinding-triggers.yaml
# Purpose: RBAC policy granting minimum required permissions to Tekton service accounts and triggers.
# Owner: integration-hub platform team

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-ci-bot-triggers-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: app-ci-bot
    namespace: ci-pipelines-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
