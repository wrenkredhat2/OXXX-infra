# Managed Manifest
# File: platform/tekton/base/rbac/rolebinding-triggers.yaml
# Purpose: RBAC policy granting minimum required permissions to Tekton service accounts and triggers.
# Owner: integration-hub platform team

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-ci-bot-triggers-rolebinding
subjects:
  - kind: ServiceAccount
    name: app-ci-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
