apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: orlen-apimanager
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  # Replace with your actual wildcard domain
  wildcardDomain: xxx
  appLabel: 3scale-api-management
  tenantName: 3scale
  resourceRequirementsEnabled: true

  apicast:
    managementAPI: status
    responseCodes: true
    # Enable TLS certificate verification for outbound APIcast calls.
    # Trusted CAs must be present in the runtime trust store.
    openSSLVerify: true
    productionSpec:
      replicas: 1
    stagingSpec:
      replicas: 1

  system:
    appSpec:
        replicas: 1
    searchdSpec: {}
    sidekiqSpec:
        replicas: 1
    fileStorage:
      persistentVolumeClaim:
        storageClassName: nfs

  backend:
    cronSpec:
      replicas: 1
    listenerSpec:
      replicas: 1
    workerSpec:
      replicas: 1

  zync:
    enabled: true
    appSpec:
      replicas: 1
    queSpec:
      replicas: 1

  externalComponents:
    backend:
      redis: true  # Tells the operator you are providing the Redis
    system:
      database: true
      redis: true
      
