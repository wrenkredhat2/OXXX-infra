apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hawtio

resources:
  - rolebinding.yaml
  - ../../../base/hawtio

patches:
  - target:
      kind: Hawtio
      name: hawtio
    patch: |-
      - op: replace
        path: /spec/routeHostName
        value: hawtio-dev.apps.cl01.arencloud.com
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
