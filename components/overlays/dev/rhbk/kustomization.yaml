apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orl-dpro-int-iam

resources:
  - rolebinding.yaml
  - ../../../base/keycloak
  - platform-dev-realm-import.yaml

patches:

  - target:
      kind: Keycloak
      name: orlen-int-kc
    patch: |-
      - op: replace
        path: /spec/hostname/hostname
        value: "keycloak.apps.dev.orlen.pl"
      - op: replace
        path: /spec/instances
        value: 2
      - op: add
        path: /spec/truststores
        value:
          openshift-trusted-ca:
            configMap:
              name: trusted-ca
      - op: add
        path: /spec/scheduling
        value:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: keycloak-operator
                  app.kubernetes.io/component: server
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: keycloak-operator
                  app.kubernetes.io/component: server
  - target:
      kind: Secret
      name: keycloak-bootstrap-admin
    patch: |-
      - op: replace
        path: /stringData/password
        value: "dev-orlen-2026"
